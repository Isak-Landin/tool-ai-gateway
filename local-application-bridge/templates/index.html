<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local UI Bridge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tree.css') }}">
</head>
<body>
    <div class="topbar">
        <h1>Local UI Bridge</h1>
        <div class="muted">Gateway: {{ gateway_base_url }}</div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Mounted file roots</h2>
            <div id="tree" class="tree"></div>
        </div>

        <div class="card">
            <h2>Selected files</h2>
            <div id="selected-files"></div>

            <h3 class="section-title">Instruction</h3>
            <textarea id="instruction" placeholder="Describe what the gateway should do with the selected files..."></textarea>

            <div class="button-row">
                <button id="send-btn">Send to gateway</button>
                <button id="refresh-btn" class="secondary" type="button">Refresh tree</button>
            </div>
        </div>
    </div>

    <div class="grid section-spacer">
        <div class="card">
            <h2>File preview</h2>
            <div id="preview-meta" class="muted"></div>
            <pre id="preview-content"></pre>
        </div>

        <div class="card">
            <h2>Gateway response</h2>
            <pre id="gateway-response"></pre>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
