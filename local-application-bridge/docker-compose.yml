services:
  local-ui-bridge:
    build: .
    container_name: local-ui-bridge
    ports:
      - "4110:4110"
    env_file:
      - .env
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      BRIDGE_HOST: ${BRIDGE_HOST}
      BRIDGE_PORT: ${BRIDGE_PORT}
      PROJECT_ROOT_1: ${PROJECT_ROOT_1}
      PROJECT_ROOT_2: ${PROJECT_ROOT_2}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES}
      ALLOW_WRITE: ${ALLOW_WRITE}
      PYTHONBUFFERED: "1"

    volumes:
      - ${PROJECT_ROOT_1}:/app/${PROJECT_NAME_1}
      - ${PROJECT_ROOT_2}:/app/${PROJECT_NAME_2}
    restart: unless-stopped
