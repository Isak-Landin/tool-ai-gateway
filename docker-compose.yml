services:
  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-gateway
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./api.py:/app/api.py
      - ./project_resolution.py:/app/project_resolution.py
      - ./runtime_binding.py:/app/runtime_binding.py
      - ./project_handle.py:/app/project_handle.py
      - ./execution.py:/app/execution.py
      - ./persistence.py:/app/persistence.py
      - ./errors.py:/app/errors.py
      - ./db:/app/db
      - ./git:/app/git
      - ./ollama:/app/ollama
      - ./archon:/app/archon
      - ./web_search:/app/web_search
      - ./index.html:/app/index.html
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    restart: unless-stopped
    depends_on:
      - gateway-db
    networks:
      - web_network

  tool-gateway-ui:
    build:
      context: ./ui/
      dockerfile: Dockerfile
    container_name: ui-tool-gateway
    env_file:
      - ./.env
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      UI_HOST: ${UI_HOST}
      UI_PORT: ${UI_PORT}
      PYTHONUNBUFFERED: "1"
      FLASK_DEBUG: ${DEBUG:-false}
    volumes:
      - ./ui/app.py:/app/app.py
      - ./ui/templates:/app/templates
      - ./ui/static:/app/static
    ports:
      - "${UI_PORT}:${UI_PORT}"
    restart: unless-stopped
    networks:
      - web_network

  gateway-db:
    image: postgres:17
    container_name: ai-tool-gateway-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tool_gateway_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web_network

volumes:
  tool_gateway_db_data:

networks:
  web_network:
    external: true
    name: web_network