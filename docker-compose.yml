services:
  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: AI-tool-gateway
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    restart: unless-stopped
    networks:
      - web_network

  #tool-gateway-db:
    #image: postgres:latest

  tool-gateway-ui:
    build:
      context: ./ui/
      dockerfile: Dockerfile
    container_name: UI-tool-gateway
    ports:
      - "${UI_PORT}:${UI_PORT}"
    env_file:
      - ./ui/.env
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      BRIDGE_HOST: ${BRIDGE_HOST}
      BRIDGE_PORT: ${BRIDGE_PORT}
      PROJECT_ROOT_1: ${PROJECT_ROOT_1}
      PROJECT_ROOT_2: ${PROJECT_ROOT_2}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES}
      ALLOW_WRITE: ${ALLOW_WRITE}
      PYTHONUNBUFFERED: "1"

    volumes:
      - ${PROJECT_ROOT_1}:/app/${PROJECT_NAME_1}
      - ${PROJECT_ROOT_2}:/app/${PROJECT_NAME_2}
    restart: unless-stopped



networks:
  web_network:
    external: true
    name: web_network