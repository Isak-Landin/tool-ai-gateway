services:
  nginx:
    image: nginx:1.27-alpine
    container_name: tool-gateway-nginx
    depends_on:
      - tool-gateway
      - tool-gateway-ui
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - web_network

  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-gateway
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
      PROJECTS_ROOT: ${PROJECTS_ROOT:-/srv/tool-ai-gateway/projects}
    volumes:
      - ${PROJECTS_HOST_ROOT:-/mnt/tool-ai-gateway/projects}:${PROJECTS_ROOT:-/srv/tool-ai-gateway/projects}
    restart: unless-stopped
    depends_on:
      - gateway-db
    networks:
      - web_network

  tool-gateway-ui:
    build:
      context: ./ui/
      dockerfile: Dockerfile
    container_name: ui-tool-gateway
    env_file:
      - ./.env
    environment:
      GATEWAY_URL: ${GATEWAY_URL}
      UI_HOST: ${UI_HOST}
      UI_PORT: ${UI_PORT}
      UI_TRUSTED_HOSTS: ${UI_TRUSTED_HOSTS:-localhost,127.0.0.1}
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    depends_on:
      - tool-gateway
    networks:
      - web_network

  gateway-db:
    image: postgres:17
    container_name: ai-tool-gateway-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tool_gateway_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web_network

volumes:
  tool_gateway_db_data:

networks:
  web_network:
    external: true
    name: web_network
