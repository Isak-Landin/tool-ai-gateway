services:
  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: AI-tool-gateway
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    restart: unless-stopped
    networks:
      - web_network

  tool-gateway-ui:
    build:
      context: ./ui/
      dockerfile: Dockerfile
    container_name: UI-tool-gateway
    env_file:
      - ./ui/.env
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${UI_PORT}:${UI_PORT}"
    restart: unless-stopped
    networks:
      - web_network

networks:
  web_network:
    external: true
    name: web_network