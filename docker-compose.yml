services:
  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-gateway
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
      PROJECTS_ROOT: ${PROJECTS_ROOT:-/srv/tool-ai-gateway/projects}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    volumes:
      - ${PROJECTS_HOST_ROOT:-/mnt/tool-ai-gateway/projects}:${PROJECTS_ROOT:-/srv/tool-ai-gateway/projects}
    restart: unless-stopped
    depends_on:
      - gateway-db
    networks:
      - web_network

  tool-gateway-ui:
    build:
      context: ./ui/
      dockerfile: Dockerfile
    container_name: ui-tool-gateway
    env_file:
      - ./.env
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL}
      UI_HOST: ${UI_HOST}
      UI_PORT: ${UI_PORT}
      UI_TRUSTED_HOSTS: ${UI_TRUSTED_HOSTS:-localhost,127.0.0.1}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${UI_PORT}:${UI_PORT}"
    restart: unless-stopped
    depends_on:
      - tool-gateway
    networks:
      - web_network

  gateway-db:
    image: postgres:17
    container_name: ai-tool-gateway-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tool_gateway_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web_network

volumes:
  tool_gateway_db_data:

networks:
  web_network:
    external: true
    name: web_network
