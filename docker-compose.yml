services:
  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-gateway
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    restart: unless-stopped
    networks:
      - web_network

  #tool-gateway-db:
    #image: postgres:latest



networks:
  web_network:
    external: true
    name: web_network