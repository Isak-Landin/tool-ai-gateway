services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--config", "/app/litellm_config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    volumes:
      - ./litellm_config.yaml:/app/litellm_config.yaml
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - web_network

  tool-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-gateway
    env_file:
      - ./.env
    ports:
      - "4100:4100"
    restart: unless-stopped
    networks:
      - web_network

networks:
  web_network:
    external: true
    name: web_network