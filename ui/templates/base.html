<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foundation/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foundation/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared/primitives.css') }}">
    {% block page_css %}{% endblock %}
</head>
    <body class="{% block body_class %}theme-shell{% endblock %}">
        {% block shell %}{% endblock %}
    <script>
        window.__AI_TOOL_GATEWAY_UI_CONFIG__ = {{ {"gatewayBaseUrl": gateway_base_url}|tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/core.js') }}"></script>
    {% block page_js %}{% endblock %}
</body>
</html>
