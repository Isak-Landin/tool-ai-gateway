{% extends "layouts/public_base.html" %}
{% block title %}Login · {{ app_name }}{% endblock %}
{% block page_css %}{{ super() }}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/public/auth.css') }}">{% endblock %}
{% block public_content %}
<section class="auth-shell panel panel-form">
    <p class="eyebrow">Access</p>
    <h1>Login</h1>
    <form class="form-grid">
        <label>Email <input type="email" placeholder="name@example.com"></label>
        <label>Password <input type="password" placeholder="Password"></label>
        <div class="button-row"><button type="button" class="button button-primary">Continue</button></div>
    </form>
</section>
{% endblock %}
