{% extends "layouts/public_base.html" %}
{% block title %}Reset Password · {{ app_name }}{% endblock %}
{% block page_css %}{{ super() }}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/public/auth.css') }}">{% endblock %}
{% block public_content %}
<section class="auth-shell panel panel-form">
    <p class="eyebrow">Recovery</p>
    <h1>Reset password</h1>
    <form class="form-grid">
        <label>New password <input type="password" placeholder="New password"></label>
        <label>Confirm password <input type="password" placeholder="Confirm password"></label>
        <div class="button-row"><button type="button" class="button button-primary">Save password</button></div>
    </form>
</section>
{% endblock %}
