<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Gateway Test UI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .desc {
      color: #94a3b8;
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.5;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }
    pre {
      margin-top: 12px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      color: #dbeafe;
      min-height: 80px;
    }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      width: 360px;
      max-width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
    }
    .hint {
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tool Gateway Test UI</h1>

    <div class="topbar">
      <label>
        <span class="hint">Base URL</span><br />
        <input id="baseUrl" type="text" value="http://141.0.85.201:41988" />
      </label>
      <div class="hint">Each button runs one of your curl-equivalent test calls and shows the response or error.</div>
    </div>

    <div class="grid" id="tests"></div>
  </div>

  <script>
    const DEFAULT_BASE_URL = 'http://141.0.85.201:41988';

    const tests = [
      {
        title: 'Chat endpoint: Hello',
        desc: 'POST /chat with a simple Hello message.',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'Hello' })
          });
        }
      },
      {
        title: 'Chat endpoint: Tool trigger',
        desc: 'POST /chat asking it to search Archon for docmost and summarize it.',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'Search Archon for docmost and summarize it' })
          });
        }
      },
      {
        title: 'Archon search passthrough',
        desc: 'GET /archon_search?q=docmost',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/archon_search?q=docmost');
        }
      },
      {
        title: 'Archon search passthrough with params',
        desc: 'GET /archon_search?q=docmost&source=&match_count=5&return_mode=chunks',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/archon_search?q=docmost&source=&match_count=5&return_mode=chunks');
        }
      },
      {
        title: 'Archon RAG query',
        desc: 'POST /archon_rag_query with Docmost question.',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/archon_rag_query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              query: 'What is Docmost?',
              source: '',
              match_count: 5,
              return_mode: 'chunks'
            })
          });
        }
      },
      {
        title: 'Web search',
        desc: 'GET /web_search?q=ollama',
        run: async (baseUrl) => {
          return fetch(baseUrl + '/web_search?q=ollama');
        }
      }
    ];

    function pretty(value) {
      if (typeof value === 'string') return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    async function parseResponse(res) {
      const text = await res.text();
      try {
        return { parsed: JSON.parse(text), raw: text };
      } catch {
        return { parsed: text, raw: text };
      }
    }

    function createCard(test, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>${index + 1}. ${test.title}</h2>
        <p class="desc">${test.desc}</p>
        <button>Run test</button>
        <div class="status">Idle</div>
        <pre></pre>
      `;

      const button = card.querySelector('button');
      const status = card.querySelector('.status');
      const output = card.querySelector('pre');

      button.addEventListener('click', async () => {
        const baseInput = document.getElementById('baseUrl');
        const baseUrl = (baseInput.value || DEFAULT_BASE_URL).trim().replace(/\/$/, '');

        button.disabled = true;
        status.textContent = 'Running...';
        status.className = 'status';
        output.textContent = '';

        try {
          const res = await test.run(baseUrl);
          const data = await parseResponse(res);

          status.textContent = `HTTP ${res.status} ${res.ok ? 'OK' : 'ERROR'}`;
          status.className = 'status ' + (res.ok ? 'ok' : 'err');
          output.textContent = pretty(data.parsed || data.raw);
        } catch (err) {
          status.textContent = 'Request failed';
          status.className = 'status err';
          output.textContent = err?.stack || err?.message || String(err);
        } finally {
          button.disabled = false;
        }
      });

      return card;
    }

    const container = document.getElementById('tests');
    tests.forEach((test, index) => container.appendChild(createCard(test, index)));
  </script>
</body>
</html>
