# Debug override – start with:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up --build
#
# Mounts host source code into containers so file edits are reflected
# instantly via uvicorn --reload (gateway) and Flask debug mode (UI),
# eliminating the need to rebuild images after every code change.

services:
  tool-gateway:
    volumes:
      - ./api.py:/app/api.py
      - ./project_resolution.py:/app/project_resolution.py
      - ./runtime_binding.py:/app/runtime_binding.py
      - ./project_handle.py:/app/project_handle.py
      - ./execution.py:/app/execution.py
      - ./persistence.py:/app/persistence.py
      - ./errors.py:/app/errors.py
      - ./db:/app/db
      - ./git:/app/git
      - ./ollama:/app/ollama
      - ./archon:/app/archon
      - ./web_search:/app/web_search
      - ./index.html:/app/index.html
    environment:
      DEBUG: "true"

  tool-gateway-ui:
    volumes:
      - ./ui/app.py:/app/app.py
      - ./ui/templates:/app/templates
      - ./ui/static:/app/static
    environment:
      FLASK_DEBUG: "true"
